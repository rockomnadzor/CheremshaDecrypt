name: Build CheremshaDecrypt

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3

      - name: Build debug APKs for ALL architectures + Universal
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug \
            -Pandroid.buildOnlyTargetAbi=false \
            --stacktrace

      - name: Upload All APKs (split + universal)
        uses: actions/upload-artifact@v4
        with:
          name: cheremsha-decrypt-debug-all-arch
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
